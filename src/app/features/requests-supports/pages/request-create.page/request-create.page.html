<main class="login-page d-flex align-items-center justify-content-center min-vh-100 p-3">
  <mat-card class="login-card create-card w-100 p-4" appearance="outlined">
    <div class="d-flex flex-column align-items-center text-center mb-4">
      <div class="login-logo d-flex align-items-center justify-content-center rounded-circle mb-3" aria-hidden="true">
        <mat-icon>description</mat-icon>
      </div>
      <h1 class="h4 fw-semibold mb-1">Nueva solicitud</h1>
    </div>

    <div class="d-flex flex-column gap-3">
      @if (!isStudent) {
        <edu-select
          label="Estudiante"
          placeholder="Selecciona un estudiante"
          [options]="studentOptions()"
          [value]="studentId()"
          (valueChange)="studentId.set($event)"
          [errorMessage]="touched() && studentId() === null ? 'Selecciona un estudiante' : null"
        />
      }

      <edu-select
        label="Tipo de apoyo"
        placeholder="Selecciona un tipo"
        [options]="typeSupportOptions"
        [value]="typeSupport()"
        (valueChange)="typeSupport.set($event)"
        [errorMessage]="touched() && typeSupport() === null ? 'Selecciona un tipo de apoyo' : null"
      />

      @if (isStudent) {
        <edu-select
          label="Asesor"
          placeholder="Selecciona un asesor"
          [options]="advisorOptions()"
          [value]="advisorId()"
          (valueChange)="advisorId.set($event)"
          [errorMessage]="touched() && advisorId() === null ? 'Selecciona un asesor' : null"
        />
      }

      <edu-numeric-input
        label="Monto solicitado"
        placeholder="0.00"
        [min]="0"
        [step]="0.01"
        [value]="requestedAmount()"
        (valueChange)="requestedAmount.set($event)"
        [errorMessage]="touched() && !amountValid() ? 'Ingresa un monto mayor a cero' : null"
      />

      <div class="edu-input">
        <label class="edu-input-label">Descripción</label>
        <mat-form-field class="edu-input-field" appearance="outline" subscriptSizing="dynamic">
          <textarea
            matInput
            rows="3"
            placeholder="Describe la solicitud"
            [value]="description()"
            (input)="description.set($any($event.target).value)"
          ></textarea>
        </mat-form-field>
        @if (touched() && !description().trim()) {
          <p class="field-error mt-1 mb-0">La descripción es obligatoria</p>
        }
      </div>

      <edu-flat-button class="login-submit" type="button" [disabled]="submitting() || loadingOptions()" (clicked)="create()">
        {{ submitting() ? 'Creando…' : 'Crear solicitud' }}
      </edu-flat-button>

      <p class="text-center text-body-secondary small mb-0">
        <a class="link-primary fw-medium text-decoration-none" routerLink="/requests">Volver a solicitudes</a>
      </p>
    </div>
  </mat-card>
</main>
